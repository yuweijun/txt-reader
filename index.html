<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Text Reader</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id=%22g%22 x1=%220%25%22 y1=%220%25%22 x2=%220%25%22 y2=%22100%25%22><stop offset=%220%25%22 style=%22stop-color:%235AC8FA%22/><stop offset=%22100%25%22 style=%22stop-color:%23007AFF%22/></linearGradient></defs><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22url(%23g)%22/><circle cx=%2250%22 cy=%2250%22 r=%2237%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222%22/><circle cx=%2250%22 cy=%2250%22 r=%2232%22 fill=%22none%22 stroke=%22white%22 stroke-width=%221%22 opacity=%220.5%22/><line x1=%2250%22 y1=%2213%22 x2=%2250%22 y2=%2220%22 stroke=%22white%22 stroke-width=%222%22/><line x1=%2250%22 y1=%2280%22 x2=%2250%22 y2=%2287%22 stroke=%22white%22 stroke-width=%222%22/><line x1=%2213%22 y1=%2250%22 x2=%2220%22 y2=%2250%22 stroke=%22white%22 stroke-width=%222%22/><line x1=%2280%22 y1=%2250%22 x2=%2287%22 y2=%2250%22 stroke=%22white%22 stroke-width=%222%22/><path d=%22M50 50 L65 35%22 stroke=%22white%22 stroke-width=%223%22 stroke-linecap=%22round%22/><path d=%22M50 50 L35 65%22 stroke=%22red%22 stroke-width=%223%22 stroke-linecap=%22round%22/><circle cx=%2250%22 cy=%2250%22 r=%223%22 fill=%22white%22/></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css">
    <!-- Color Schemes (consolidated) -->
    <link rel="stylesheet" href="css/themes.css">
    <!-- CSS Utilities -->
    <link rel="stylesheet" href="css/utilities.css">
    <!-- iOS-style modals -->
    <link rel="stylesheet" href="css/modal.css">
    <!-- Index page styles -->
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="container">
        <!-- Upload Section -->
        <div class="main-card">
            <div class="upload-section">
                <div class="upload-row">
                    <input type="file" id="fileInput" accept=".txt" class="form-control">
                    <button id="processFileBtn" class="btn btn-primary btn-sm" disabled>
                        <i class="fas fa-upload"></i> Upload File
                    </button>
                </div>
            </div>
        </div>

        <!-- Books List Section -->
        <div class="main-card">
            <div class="section-header">
                <h6><i class="fas fa-book"></i> Books</h6>
            </div>
            
            <!-- Loading State -->
            <div id="loadingState" class="loading-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading...</p>
            </div>
            
            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-book-open"></i>
                <p>No documents yet</p>
            </div>
            
            <!-- Stories List -->
            <div id="storiesList" style="display: none;"></div>
            
            <!-- Pagination Controls -->
            <div id="paginationControls" class="pagination-controls" style="display: none;">
                <button id="prevPageBtn" class="btn btn-outline-primary btn-sm" disabled>
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span id="pageInfo" class="page-info">1 / 1</span>
                <button id="nextPageBtn" class="btn btn-outline-primary btn-sm" disabled>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p id="loadingText">Loading...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ios-utils.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/database.js"></script>
    <script src="js/fileProcessor.js"></script>
    <script src="js/init.js"></script>
</body>
</html>
